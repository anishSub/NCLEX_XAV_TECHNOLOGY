{% load static %}
{% load socialaccount %} <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - NCLEX Core</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="{% static 'users/css/style.css' %}">
</head>
<body>

    <div class="auth-card" style="max-width: 450px;">
        <h2>Create Account</h2>
        <p>Start your journey to becoming a nurse</p>

        <form method="POST">
            {% csrf_token %}
            
            {% for field in form %}
                <div class="form-group">
                    <label for="{{ field.id_for_label }}">{{ field.label }}</label>
                    <input type="{{ field.field.widget.input_type }}" 
                           name="{{ field.name }}" 
                           id="{{ field.id_for_label }}" 
                           class="form-control"
                           {% if field.value %}value="{{ field.value }}"{% endif %}>
                    
                    {% if field.errors %}
                        <div style="color:red; font-size: 0.8rem; margin-top: 5px;">
                            {{ field.errors.0 }}
                        </div>
                    {% endif %}
                </div>
            {% endfor %}

            <button type="submit" class="btn-primary">Create Account</button>
        </form>

        <div class="divider">
            <span>Or sign up with</span>
        </div>

        <div class="social-buttons">
            <a href="{% provider_login_url 'google' %}" class="btn-social google" style="text-decoration: none;">
                <i class="fab fa-google"></i> Google
            </a>

            <a href="{% provider_login_url 'facebook' %}" class="btn-social facebook" style="text-decoration: none;">
                <i class="fab fa-facebook-f"></i> Facebook
            </a>
        </div>

        <div class="auth-footer">
            Already have an account? <a href="{% url 'login' %}">Login</a>
        </div>
    </div>

</body>
</html>
