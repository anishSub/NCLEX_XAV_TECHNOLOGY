{% load static %}
{% load socialaccount %} <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - NCLEX Core</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="{% static 'users/css/style.css' %}">
</head>
<body>

    <div class="auth-card">
        <h2>Welcome Back</h2>
        <p>Sign in to continue your NCLEX prep</p>

        <form method="POST">
            {% csrf_token %}
            
            {% if form.errors %}
                <div class="error-list">
                    <p>Invalid Email or Password.</p>
                </div>
            {% endif %}

            <div class="form-group">
                <label for="id_username">Email Address</label>
                {{ form.username }} 
            </div>

            <div class="form-group">
                <label for="id_password">Password</label>
                {{ form.password }}
            </div>

            <button type="submit" class="btn-primary">Login</button>
        </form>

        <div class="divider">
            <span>Or continue with</span>
        </div>

        <div class="social-buttons">
            <a href="{% provider_login_url 'google' %}" class="btn-social google" style="text-decoration: none;">
                <i class="fab fa-google"></i> Google
            </a>

            <a href="{% provider_login_url 'facebook' %}" class="btn-social facebook" style="text-decoration: none;">
                <i class="fab fa-facebook-f"></i> Facebook
            </a>
        </div>

        <div class="auth-footer">
            Don't have an account? <a href="{% url 'register' %}">Sign Up</a>
        </div>
    </div>

</body>
</html>
